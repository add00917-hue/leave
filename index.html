<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GNR3 Team Plans — แอปสมาชิก</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy-deep:#07182E;--navy-dark:#0A2342;--navy:#15396E;--navy-mid:#2C5BA0;--navy-soft:#3D6BB0;
  --yellow:#FFC52E;--yellow-bright:#FFD449;--yellow-dark:#F4A810;--yellow-pale:#FFF6DE;
  --canvas:#EEF2F8;--card:#FFFFFF;--ink:#0E2138;--ink-mid:#46587A;--ink-soft:#8593AC;--line:#E2E8F2;
  --success:#10B981;--success-bg:#E7F8F1;--warning:#F59E0B;--warning-bg:#FEF4E2;--danger:#EF4444;--danger-bg:#FCEBEB;
  --c-sick:#EF4444;--c-personal:#6366F1;--c-other:#8B5CF6;--c-vacation:#10B981;--c-internal:#0EA5E9;--c-esv:#0891B2;--c-event:#EC4899;--c-overtime:#F97316;--c-offsite:#14B8A6;
  --r:18px;--r-sm:12px;--pill:50px;--font:'Prompt',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--navy-deep);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.hidden{display:none!important}
:focus,:focus-visible{outline:none}
::-webkit-scrollbar{width:0;height:0}

/* device frame */
.device{max-width:440px;margin:0 auto;min-height:100vh;background:var(--canvas);position:relative;overflow:hidden;display:flex;flex-direction:column}
@media(min-width:480px){
  body{padding:24px 0;background:radial-gradient(120% 80% at 50% 0%,#16386e,#07182e)}
  .device{min-height:calc(100vh - 48px);height:880px;border-radius:42px;box-shadow:0 40px 90px rgba(0,0,0,.5),0 0 0 11px #0d1b30,0 0 0 13px #1e2d45;overflow:hidden}
}

/* ===== LOGIN ===== */
.login{position:absolute;inset:0;z-index:50;background:radial-gradient(130% 100% at 50% 0%,#1A3F7A,#0A2342 55%,#07182E);display:flex;flex-direction:column;justify-content:center;padding:34px 28px;color:#fff;overflow:hidden}
.login .glow{position:absolute;border-radius:50%;filter:blur(60px);opacity:.5}
.login .glow.y{width:240px;height:240px;background:rgba(255,197,46,.35);top:-60px;right:-50px}
.login .glow.b{width:300px;height:300px;background:rgba(61,107,176,.5);bottom:-90px;left:-70px}
.login-inner{position:relative;z-index:2}
.lg-mark{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--yellow-bright),var(--yellow-dark));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:22px;color:var(--navy-deep);box-shadow:0 12px 30px rgba(255,180,20,.4);margin-bottom:24px}
.lg-word{font-family:var(--mono);font-weight:600;font-size:40px;letter-spacing:1px;line-height:1}.lg-word .ac{color:var(--yellow-bright)}
.lg-sub{font-size:14px;color:rgba(255,255,255,.7);margin-top:8px;line-height:1.5}
.lg-form{margin-top:34px;display:flex;flex-direction:column;gap:14px}
.lg-field label{font-size:12px;color:rgba(255,255,255,.65);font-weight:500;display:block;margin-bottom:7px}
.lg-field input{width:100%;padding:15px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:#fff;font-size:15px;outline:none;transition:.16s}
.lg-field input:focus{border-color:var(--yellow);background:rgba(255,255,255,.12)}
.lg-field input::placeholder{color:rgba(255,255,255,.4)}
.lg-btn{margin-top:8px;padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--yellow-bright),var(--yellow-dark));color:var(--navy-deep);font-size:16px;font-weight:700;box-shadow:0 10px 26px rgba(255,180,20,.36);display:flex;align-items:center;justify-content:center;gap:9px;transition:.14s}
.lg-btn:active{transform:scale(.98)}
.lg-btn svg{width:21px;height:21px;flex-shrink:0}
.lg-hint{margin-top:18px;font-size:11.5px;color:rgba(255,255,255,.5);text-align:center;line-height:1.6}
.lg-foot{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:10.5px;color:rgba(255,255,255,.35);font-family:var(--mono);z-index:2}

/* ===== APP HEADER ===== */
.appbar{background:linear-gradient(135deg,var(--navy-dark),var(--navy));color:#fff;padding:20px 20px 18px;flex-shrink:0;position:relative;overflow:hidden}
.appbar .bg{position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,197,46,.13);filter:blur(40px);top:-90px;right:-50px}
.ab-top{display:flex;align-items:center;gap:12px;position:relative;z-index:2}
.ab-ava{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--navy-soft),var(--navy-mid));display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;flex-shrink:0}
.ab-hi{font-size:12.5px;color:rgba(255,255,255,.6)}.ab-name{font-size:16px;font-weight:700}
.ab-bell{margin-left:auto;width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;position:relative}
.ab-bell svg{width:20px;height:20px}.ab-bell .d{position:absolute;top:10px;right:11px;width:8px;height:8px;border-radius:50%;background:var(--yellow);border:2px solid var(--navy)}
.ab-title{font-size:20px;font-weight:700;position:relative;z-index:2}
.ab-sub{font-size:12.5px;color:rgba(255,255,255,.6);position:relative;z-index:2;margin-top:2px}

/* ===== SCREENS ===== */
.screens{flex:1;overflow-y:auto;padding:18px 16px 96px}
.screen{display:none;animation:fade .3s}.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.qstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.qstat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 12px;text-align:center;box-shadow:0 2px 8px rgba(10,35,66,.05)}
.qstat b{font-family:var(--mono);font-size:24px;font-weight:600;display:block;line-height:1}
.qstat span{font-size:11px;color:var(--ink-soft);margin-top:5px;display:block}
.qstat.a b{color:var(--yellow-dark)}.qstat.r b{color:var(--danger)}.qstat.g b{color:var(--success)}

.sec-h{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 12px}
.sec-h h3{font-size:15px;font-weight:700}.sec-h a{font-size:12.5px;color:var(--navy);font-weight:600}

.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.qa{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(10,35,66,.05);transition:.14s}
.qa:active{transform:scale(.97)}
.qa .ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa .ic svg{width:21px;height:21px;color:#fff}
.qa .t{font-size:13.5px;font-weight:600;line-height:1.2}.qa .s{font-size:11px;color:var(--ink-soft)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 2px 8px rgba(10,35,66,.05)}
.rec-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid #EEF2F8;align-items:center}
.rec-item:last-child{border-bottom:none}
.rec-item .bar{width:4px;align-self:stretch;border-radius:3px;flex-shrink:0}
.rec-b{flex:1;min-width:0}.rec-t{font-size:14px;font-weight:600;line-height:1.25}
.rec-m{font-size:11.5px;color:var(--ink-soft);margin-top:3px}
.cat-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--pill);color:#fff;white-space:nowrap;display:inline-block}
.st{font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--pill);white-space:nowrap}
.st-pending{background:var(--warning-bg);color:#B47400}.st-approved{background:var(--success-bg);color:#0B7A55}
.st-rejected{background:var(--danger-bg);color:#C0392B}.st-cancelled{background:#EDF1F8;color:var(--ink-soft)}.st-none{background:#E8EEF8;color:var(--navy)}

/* calendar */
.cal-card{padding:16px}
.cal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-h .t{font-size:16px;font-weight:700}.cal-h .t .en{font-size:11px;color:var(--ink-soft);font-family:var(--mono);font-weight:500}
.cal-h button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-mid)}
.cal-h button svg{width:16px;height:16px}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:10px;color:var(--ink-soft);font-weight:600;padding:4px 0}
.cal-c{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;position:relative;border:1px solid transparent}
.cal-c.muted{color:var(--ink-soft);opacity:.4}.cal-c.today{background:var(--yellow-pale);border-color:var(--yellow-dark);color:var(--yellow-dark)}
.cal-c.sel{border-color:var(--navy);background:#F4F8FD}.cal-c.we{color:var(--danger)}
.cal-c.holi{background:#FDECEC;color:#C0392B}
.holi-tip{display:flex;align-items:center;gap:7px;padding:9px 12px;border-radius:11px;background:#FDECEC;color:#C0392B;font-size:12.5px;font-weight:600;margin-bottom:12px}
.holi-tip svg{width:15px;height:15px;flex-shrink:0}
.cal-c .dots{display:flex;gap:2px;position:absolute;bottom:5px}.cal-c .dot{width:5px;height:5px;border-radius:50%}

/* chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px}
.chip{padding:8px 14px;border-radius:var(--pill);background:#fff;border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--ink-mid);white-space:nowrap;flex-shrink:0}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff}

/* profile */
.prof-top{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;text-align:center;box-shadow:0 2px 8px rgba(10,35,66,.05)}
.prof-ava{width:74px;height:74px;border-radius:22px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:30px;color:#fff}
.prof-name{font-size:19px;font-weight:700}.prof-role{font-size:13px;color:var(--ink-soft);margin-top:3px}
.prof-list{margin-top:14px}
.prof-row{display:flex;align-items:center;gap:13px;padding:15px;background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:10px}
.prof-row .ic{width:38px;height:38px;border-radius:11px;background:var(--canvas);display:flex;align-items:center;justify-content:center;color:var(--navy);flex-shrink:0}
.prof-row .ic svg{width:18px;height:18px}.prof-row .l{font-size:14px;font-weight:600}.prof-row .v{font-size:12px;color:var(--ink-soft)}
.prof-row .ar{margin-left:auto;color:var(--ink-soft)}
.logout{width:100%;margin-top:8px;padding:15px;border-radius:14px;background:var(--danger-bg);color:var(--danger);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px}

/* ===== BOTTOM NAV ===== */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:76px;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:0 8px 6px;z-index:20}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:10px;color:var(--ink-soft);font-size:10.5px;font-weight:600}
.tab svg{width:23px;height:23px;stroke-width:2}
.tab.on{color:var(--navy)}
.fab{width:58px;height:58px;border-radius:20px;background:linear-gradient(135deg,var(--yellow-bright),var(--yellow-dark));display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(255,180,20,.45);margin-top:-26px;flex-shrink:0}
.fab svg{width:27px;height:27px;color:var(--navy-deep);stroke-width:2.6}
.fab:active{transform:scale(.94)}

/* ===== SHEET (bottom modal) ===== */
.sheet-bg{position:absolute;inset:0;background:rgba(7,24,46,.5);z-index:60;display:none;align-items:flex-end}
.sheet-bg.open{display:flex;animation:fade .2s}
.sheet{background:#fff;width:100%;max-height:92%;border-radius:26px 26px 0 0;overflow-y:auto;animation:up .32s cubic-bezier(.16,1,.3,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet-h{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.sheet-h h3{font-size:17px;font-weight:700}
.sheet-h .x{width:34px;height:34px;border-radius:10px;background:var(--canvas);display:flex;align-items:center;justify-content:center;color:var(--ink-mid)}
.sheet-h .x svg{width:18px;height:18px}
.sheet-b{padding:18px 20px 28px}
.sheet-grip{width:40px;height:4px;border-radius:3px;background:#D5DEEC;margin:9px auto 0}

.pick{display:flex;align-items:center;gap:13px;padding:15px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;transition:.14s}
.pick:active{background:var(--canvas)}
.pick .ic{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pick .ic svg{width:22px;height:22px;color:#fff}
.pick .t{font-size:15px;font-weight:600}.pick .s{font-size:12px;color:var(--ink-soft)}
.pick .ar{margin-left:auto;color:var(--ink-soft)}

.field{margin-bottom:15px}.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:14.5px;color:var(--ink);background:#fff;outline:none;transition:.16s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy-soft);box-shadow:0 0 0 3px rgba(44,91,160,.12)}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:8px}
.type-opt{padding:12px;border:1.5px solid var(--line);border-radius:12px;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ink-mid)}
.type-opt .sw{width:13px;height:13px;border-radius:4px;flex-shrink:0}
.type-opt.on{border-color:var(--navy);background:#F4F8FD;color:var(--ink)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #EEF2F8}
.toggle-row .l{font-size:14px;font-weight:600}.toggle-row .s{font-size:11.5px;color:var(--ink-soft)}
.tg{width:46px;height:26px;border-radius:50px;background:#CBD5E6;position:relative;transition:.2s;flex-shrink:0}
.tg::after{content:"";position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 2px 5px rgba(0,0,0,.2)}
.tg.on{background:var(--success)}.tg.on::after{left:23px}
.submit{width:100%;margin-top:14px;padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--yellow-bright),var(--yellow-dark));color:var(--navy-deep);font-size:15.5px;font-weight:700;box-shadow:0 8px 20px rgba(255,180,20,.35);display:flex;align-items:center;justify-content:center;gap:8px}
.submit:active{transform:scale(.99)}

.empty{text-align:center;padding:40px 20px;color:var(--ink-soft)}
.empty svg{width:42px;height:42px;color:#C3CEE0;margin-bottom:12px}.empty h4{font-size:14px;color:var(--ink-mid);font-weight:600}.empty p{font-size:12.5px;margin-top:4px}

.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:var(--navy-deep);color:#fff;padding:13px 22px;border-radius:14px;font-size:13.5px;font-weight:500;z-index:80;box-shadow:0 12px 30px rgba(0,0,0,.3);display:flex;align-items:center;gap:9px;opacity:0;transition:.3s;max-width:90%}
.toast svg{width:18px;height:18px;color:var(--success)}.toast.show{opacity:1}
.day-sheet-list{display:flex;flex-direction:column;gap:9px}
</style>
</head>
<body>
<div class="device" id="device">

  <!-- LOGIN -->
  <div class="login" id="login">
    <div class="glow y"></div><div class="glow b"></div>
    <div class="login-inner">
      <div class="lg-mark">G3</div>
      <div class="lg-word">GN<span class="ac">R3</span></div>
      <div class="lg-sub">Plans &amp; activities of the GNR3 team<br>แอปสมาชิก — บันทึกแผนงานและกิจกรรม</div>
      <div class="lg-form">
        <div class="lg-field"><label>ชื่อผู้ใช้ (Username)</label><input id="lg-user" value="thanapat" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div class="lg-field"><label>รหัสผ่าน (Password)</label><input id="lg-pass" type="password" value="gnr3@123" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="lg-btn" onclick="doLogin()">เข้าสู่ระบบ
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
        <div class="lg-hint">ตัวอย่างเข้าใช้: <b>thanapat</b> / gnr3@123 (สมาชิก)<br>หรือ <b>admin</b> / gnr3@admin (ผู้ดูแล)</div>
      </div>
    </div>
    <div class="lg-foot">OPS-BSCS • © 2026</div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden" style="display:flex;flex-direction:column;flex:1;min-height:0">
    <div class="appbar">
      <div class="bg"></div>
      <div class="ab-top">
        <div class="ab-ava" id="ab-ava">ธ</div>
        <div><div class="ab-hi">สวัสดี 👋</div><div class="ab-name" id="ab-name">ธนภัทร</div></div>
        <button class="ab-bell" onclick="toast('ยังไม่มีการแจ้งเตือนใหม่')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="d"></span></button>
      </div>
      <div style="margin-top:16px"><div class="ab-title" id="scr-title">หน้าแรก</div><div class="ab-sub" id="scr-sub">ภาพรวมของฉันวันนี้</div></div>
    </div>

    <div class="screens">
      <div class="screen on" id="s-home"></div>
      <div class="screen" id="s-cal"></div>
      <div class="screen" id="s-list"></div>
      <div class="screen" id="s-profile"></div>
    </div>

    <nav class="tabbar">
      <button class="tab on" data-s="home" onclick="nav('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>หน้าแรก</button>

/* ===== CALENDAR ===== */
function renderCal(){
  const dim=daysIn(calY,calM), first=new Date(calY,calM,1).getDay();
  let cells=DOW_TH.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++)cells+=`<div class="cal-c muted"></div>`;
  for(let d=1;d<=dim;d++){const ds=calY+'-'+pad(calM+1)+'-'+pad(d);const recs=recOn(ds);const dow=new Date(calY,calM,d).getDay();const hol=holiName(ds);
    const cls=['cal-c'];if(ds===TODAY)cls.push('today');if(ds===selDate)cls.push('sel');if(dow===0||dow===6)cls.push('we');if(hol)cls.push('holi');
    let dots=(hol?'<span class="dot" style="background:#C0392B"></span>':'')+recs.slice(0,3).map(r=>`<span class="dot" style="background:${CAT[r.cat].c}"></span>`).join('');
    cells+=`<div class="${cls.join(' ')}" onclick="selDate='${ds}';renderCal();openDay('${ds}')">${d}<div class="dots">${dots}</div></div>`;}
  const recs=recOn(selDate);
  document.getElementById('s-cal').innerHTML=`
  <div class="card cal-card">
    <div class="cal-h"><div class="t">${THAI_M[calM]} ${be(calY)}<div class="en">${EN_M[calM]} ${calY}</div></div>
      <div style="display:flex;gap:8px"><button onclick="calStep(-1)">${I.chevL}</button><button onclick="calStep(1)">${I.chevR}</button></div></div>
    <div class="cal-g">${cells}</div>
  </div>
  <div class="sec-h"><h3>${selDate===TODAY?'วันนี้':fmtTH(selDate)}</h3><a onclick="openDay('${selDate}')">รายละเอียด</a></div>
  ${holiName(selDate)?`<div class="holi-tip">${I.cal} วันหยุดบริษัท: ${esc(holiName(selDate))}</div>`:''}
  <div class="card">${recs.length?recs.map(recRow).join(''):emptyHTML('ไม่มีกิจกรรมในวันนี้')}</div>`;
}
function calStep(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}
function openDay(ds){const recs=recOn(ds);const d=parse(ds);const hol=holiName(ds);
  openSheet(`${d.getDate()} ${THAI_M[d.getMonth()]} ${be(d.getFullYear())}`,
    `${hol?`<div class="holi-tip">${I.cal} วันหยุดบริษัท: ${esc(hol)}</div>`:''}<div class="day-sheet-list">${recs.length?recs.map(r=>{const e=emp(r.emp);return `<div class="rec-item" style="border:1px solid var(--line);border-radius:14px"><div class="bar" style="background:${CAT[r.cat].c}"></div>

}

  <div class="chips">${Object.keys(groups).map(k=>`<button class="chip ${listF===k?'on':''}" onclick="listF='${k}';renderList()">${groups[k]}</button>`).join('')}</div>
  <div class="card">${f.length?f.sort((a,b)=>a.start<b.start?1:-1).map(r=>`<div class="rec-item" onclick="openRec('${r.id}')"><div class="bar" style="background:${CAT[r.cat].c}"></div>
    <div class="rec-b"><div class="rec-t">${esc(r.title)}</div><div class="rec-m"><span class="cat-pill" style="background:${CAT[r.cat].c}">${CAT[r.cat].th}</span> ${fmtTH(r.start)}${r.end!==r.start?' – '+fmtTH(r.end):''}</div></div>
    <span class="st st-${r.status}">${ST[r.status]}</span></div>`).join(''):emptyHTML('ยังไม่มีรายการ')}</div>`;
}
function openRec(id){const r=records.find(x=>x.id===id);
  openSheet('รายละเอียด',`<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px">
    <span class="cat-pill" style="background:${CAT[r.cat].c};font-size:12px;padding:4px 12px">${CAT[r.cat].th}</span><span class="st st-${r.status}">${ST[r.status]}</span></div>
    <div style="font-size:18px;font-weight:700;margin-bottom:14px">${esc(r.title)}</div>
    <div class="prof-row"><div class="ic">${I.cal}</div><div><div class="l" style="font-size:13px">${fmtTH(r.start)}${r.end!==r.start?' – '+fmtTH(r.end):''}</div><div class="v">วันที่</div></div></div>
    ${r.location?`<div class="prof-row"><div class="ic">${I.pin}</div><div><div class="l" style="font-size:13px">${esc(r.location)}</div><div class="v">สถานที่</div></div></div>`:''}
    ${r.cat==='offsite'?`<div class="prof-row"><div class="ic">${I.pin}</div><div><div class="l" style="font-size:13px">${r.overnight?'ค้างคืน':'ไปกลับ'} • ${r.cost!=null?'฿'+Number(r.cost).toLocaleString():'ไม่มีค่าใช้จ่าย'}</div><div class="v">ค้างคืน / ค่าใช้จ่าย</div></div></div>`:''}
    ${r.note?`<div class="prof-row"><div class="ic">${I.inbox}</div><div><div class="l" style="font-size:13px">${esc(r.note)}</div><div class="v">หมายเหตุ</div></div></div>`:''}
    ${r.status==='pending'?`<button class="submit" style="background:var(--danger-bg);color:var(--danger);box-shadow:none;margin-top:16px" onclick="records.find(x=>x.id==='${r.id}').status='cancelled';closeSheet();nav(curScr);toast('ยกเลิกคำขอแล้ว')">ยกเลิกคำขอ</button>`:''}`);
}

/* ===== PROFILE ===== */
function renderProfile(){
  document.getElementById('s-profile').innerHTML=`
  <div class="prof-top"><div class="prof-ava" style="background:${avaColor(CUR.id)}">${initial(CUR.name)}</div>
    <div class="prof-name">${esc(CUR.name)}</div><div class="prof-role">${esc(CUR.pos)} • ${esc(CUR.dept)}</div></div>
  <div class="prof-list">
    <div class="prof-row"><div class="ic">${I.user}</div><div><div class="l">${esc(CUR.id)}</div><div class="v">รหัสสมาชิก</div></div></div>
    <div class="prof-row"><div class="ic">${I.badge}</div><div><div class="l">${({user:'ผู้ใช้ทั่วไป',approver:'ผู้อนุมัติ',admin:'ผู้ดูแลระบบ'})[CUR.role]}</div><div class="v">สิทธิ์การใช้งาน</div></div></div>
    <div class="prof-row"><div class="ic">${I.line}</div><div><div class="l">เชื่อมต่อ LINE</div><div class="v">รับการแจ้งเตือน</div></div><div class="tg on" style="margin-left:auto" onclick="this.classList.toggle('on')"></div></div>
    <div class="prof-row" onclick="openHolidays()"><div class="ic" style="background:#FDECEC;color:#C0392B">${I.cal}</div><div><div class="l">วันหยุดบริษัท</div><div class="v">${holidays.length} วันในปีนี้</div></div><div class="ar">${I.ar}</div></div>
  </div>
  <button class="logout" onclick="logout()">${I.out} ออกจากระบบ</button>
  <div style="text-align:center;font-size:11px;color:var(--ink-soft);margin-top:18px;font-family:var(--mono)">GNR3 Team Plans v1.0 • OPS-BSCS</div>`;
}

/* ===== SHEETS / FORMS ===== */
function openSheet(title,body){
  document.getElementById('sheet').innerHTML=`<div class="sheet-grip"></div><div class="sheet-h"><h3>${title}</h3><button class="x" onclick="closeSheet()">${I.x}</button></div><div class="sheet-b">${body}</div>`;
  document.getElementById('sheet-bg').classList.add('open');
}
function closeSheet(){document.getElementById('sheet-bg').classList.remove('open');}
document.getElementById('sheet-bg').addEventListener('click',e=>{if(e.target.id==='sheet-bg')closeSheet();});

function openPicker(){
  openSheet('แจ้งรายการใหม่',`
    ${pick('leave','#15396E',I.cal,'แจ้งลา','ป่วย / กิจ / อื่นๆ / พักร้อน')}
    ${pick('training','#0EA5E9',I.cap,'อบรม / กิจกรรม','อบรมภายใน / ESV / กิจกรรม')}
    ${pick('overtime','#F97316',I.bolt,'ทำงานล่วงเวลา (OT)','บันทึก OT')}
    ${pick('offsite','#14B8A6',I.pin,'งานนอกสถานที่','ค้างคืน / ค่าใช้จ่าย')}`);
}
function pick(type,c,icon,t,s){return `<button class="pick" style="width:100%;text-align:left" onclick="openForm('${type}')"><div class="ic" style="background:${c}">${icon}</div><div><div class="t">${t}</div><div class="s">${s}</div></div><div class="ar">${I.ar}</div></button>`;}

let formType='sick';
function openForm(group){
  const today=TODAY;
  if(group==='leave'){formType='sick';
    openSheet('แจ้งลา',`
      <div class="field"><label>ประเภทการลา</label><div class="type-grid" id="type-grid">
        ${['sick','personal','other','vacation'].map(k=>typeOpt(k)).join('')}</div></div>
      <div class="row2"><div class="field"><label>วันที่เริ่ม</label><input type="date" id="f-start" value="${today}"></div><div class="field"><label>ถึงวันที่</label><input type="date" id="f-end" value="${today}"></div></div>
      <div class="field"><label>เหตุผล</label><textarea id="f-note" placeholder="ระบุเหตุผล"></textarea></div>
      ${submitBtn('submitLeave()')}`);
  } else if(group==='training'){formType='internal';
    openSheet('อบรม / กิจกรรม',`
      <div class="field"><label>ประเภท</label><div class="type-grid" id="type-grid">${['internal','esv','event'].map(k=>typeOpt(k)).join('')}</div></div>
      <div class="field"><label>ชื่อหัวข้อ / กิจกรรม</label><input id="f-title" placeholder="เช่น อบรม Security ภายใน"></div>
      <div class="field"><label>สถานที่</label><input id="f-loc" placeholder="เช่น ห้องประชุม A / ศูนย์ ESV"></div>
      <div class="row2"><div class="field"><label>วันที่เริ่ม</label><input type="date" id="f-start" value="${today}"></div><div class="field"><label>ถึงวันที่</label><input type="date" id="f-end" value="${today}"></div></div>
      <div class="row2"><div class="field"><label>เวลาเริ่ม</label><input type="time" id="f-st"></div><div class="field"><label>เวลาสิ้นสุด</label><input type="time" id="f-et"></div></div>
      ${submitBtn('submitTrain()')}`);
  } else { // overtime or offsite
    formType=group;
    openSheet(group==='overtime'?'ทำงานล่วงเวลา (OT)':'งานนอกสถานที่',`
      <div class="field"><label>ประเภท</label><div class="type-grid" id="type-grid">${['overtime','offsite'].map(k=>typeOpt(k,'otToggle')).join('')}</div></div>
      <div class="field"><label>ชื่องาน</label><input id="f-title" placeholder="เช่น ปิดยอดสิ้นเดือน"></div>
      <div class="field"><label>สถานที่</label><input id="f-loc" placeholder="เช่น สำนักงาน / ชลบุรี"></div>
      <div class="row2"><div class="field"><label>วันที่เริ่ม</label><input type="date" id="f-start" value="${today}"></div><div class="field"><label>ถึงวันที่</label><input type="date" id="f-end" value="${today}"></div></div>
      <div class="row2"><div class="field"><label>เวลาเริ่ม</label><input type="time" id="f-st"></div><div class="field"><label>เวลาสิ้นสุด</label><input type="time" id="f-et"></div></div>
      <div id="offsite-extra" class="${group==='offsite'?'':'hidden'}">
        <div class="toggle-row"><div><div class="l">ค้างคืน</div><div class="s">ค้างคืนนอกสถานที่</div></div><div class="tg" id="f-overnight" onclick="this.classList.toggle('on')"></div></div>
        <div class="toggle-row"><div><div class="l">มีค่าใช้จ่าย</div><div class="s">เปิดเพื่อกรอกจำนวนเงิน</div></div><div class="tg" id="f-hascost" onclick="this.classList.toggle('on');document.getElementById('cost-wrap').classList.toggle('hidden',!this.classList.contains('on'))"></div></div>
        <div class="field hidden" id="cost-wrap" style="margin-top:12px"><label>จำนวนเงิน (บาท)</label><input type="number" id="f-cost" class="mono" placeholder="0"></div>
      </div>
      ${submitBtn('submitOT()')}`);
  }
}
function typeOpt(k,cb){return `<button class="type-opt ${k===formType?'on':''}" data-k="${k}" onclick="setType('${k}'${cb?",'"+cb+"'":''})"><span class="sw" style="background:${CAT[k].c}"></span>${CAT[k].th}</button>`;}
function setType(k,cb){formType=k;document.querySelectorAll('#type-grid .type-opt').forEach(o=>o.classList.toggle('on',o.dataset.k===k));if(cb==='otToggle')otToggle();}
function otToggle(){const ex=document.getElementById('offsite-extra');if(ex)ex.classList.toggle('hidden',formType!=='offsite');}
function submitBtn(fn){return `<button class="submit" onclick="${fn}">${I.check} ส่งรายการ</button>`;}
const fv=id=>{const e=document.getElementById(id);return e?e.value:'';};

function submitLeave(){const cat=formType;
  records.unshift(R(CUR.id,cat,fv('f-start'),fv('f-end'),{note:fv('f-note'),status:CAT[cat].approve?'pending':'none'}));
  closeSheet();nav(curScr);toast(CAT[cat].approve?'ส่งคำขอลาแล้ว รออนุมัติ':'บันทึกลาพักร้อนแล้ว');}
function submitTrain(){const cat=formType;
  records.unshift(R(CUR.id,cat,fv('f-start'),fv('f-end'),{title:fv('f-title')||CAT[cat].th,location:fv('f-loc'),st:fv('f-st'),et:fv('f-et'),status:CAT[cat].approve?'pending':'none'}));
  closeSheet();nav(curScr);toast('บันทึกรายการแล้ว');}
function submitOT(){const cat=formType;const off=cat==='offsite';
  const overnight=off&&document.getElementById('f-overnight').classList.contains('on');
  const hasCost=off&&document.getElementById('f-hascost').classList.contains('on');
  records.unshift(R(CUR.id,cat,fv('f-start'),fv('f-end'),{title:fv('f-title')||CAT[cat].th,location:fv('f-loc'),st:fv('f-st'),et:fv('f-et'),overnight,cost:hasCost?Number(fv('f-cost')||0):null,status:'pending'}));
  closeSheet();nav(curScr);toast('บันทึกรายการแล้ว รออนุมัติ');}

function openHolidays(){
  const sorted=[...holidays].sort((a,b)=>a.date<b.date?-1:1); const byM={};
  sorted.forEach(h=>{const m=h.date.slice(0,7);(byM[m]=byM[m]||[]).push(h);});
  const DOWF=['อา','จ','อ','พ','พฤ','ศ','ส'];
  const body=Object.keys(byM).sort().map(m=>{const md=parse(m+'-01');
    return `<div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:14px 0 8px">${THAI_M[md.getMonth()]} ${be(md.getFullYear())}</div>`+
    byM[m].map(h=>{const dd=parse(h.date);return `<div class="rec-item" style="border:1px solid var(--line);border-radius:14px;margin-bottom:8px">
      <div style="width:46px;height:46px;border-radius:12px;background:#FDECEC;color:#C0392B;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;line-height:1.1"><b class="mono" style="font-size:17px">${dd.getDate()}</b><span style="font-size:9px">${THAI_MS[dd.getMonth()]}</span></div>
      <div class="rec-b"><div class="rec-t" style="font-size:13.5px">${esc(h.name)}</div><div class="rec-m">วัน${['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'][dd.getDay()]} • ${h.type==='company'?'วันหยุดบริษัท':'วันหยุดราชการ'}</div></div></div>`;}).join('');}).join('');
  openSheet('วันหยุดบริษัท '+be(2026),body);
}

/* ===== TOAST ===== */
let tT;
function toast(msg,kind){const t=document.getElementById('toast');t.innerHTML=(kind==='err'?'':I.check)+'<span>'+msg+'</span>';t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2400);}

</script>
</body>
</html>
